server {
    listen 80;
    server_name koonect.fr www.koonect.fr;
    root /var/www/koonect/public;
    index index.php;
    charset utf-8;

    # Logging
    access_log /var/log/nginx/koonect_access.log;
    error_log  /var/log/nginx/koonect_error.log warn;

    # Taille max upload
    client_max_body_size 12M;

    # Gzip
    gzip on;
    gzip_types text/html text/css application/javascript application/json image/svg+xml;
    gzip_min_length 256;

    # Cache assets statiques
    location ~* \.(css|js|webp|jpg|jpeg|png|svg|gif|ico|woff2|woff|ttf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Bloquer l'accès aux répertoires sensibles
    location ~ ^/(app|storage/logs|sql|docker)/ {
        deny all;
        return 404;
    }

    # Bloquer les fichiers PHP dans uploads (sécurité upload)
    location ~ ^/storage/uploads/.*\.(php|phtml|phar)$ {
        deny all;
        return 404;
    }

    # Route principale
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # PHP-FPM
    location ~ \.php$ {
        fastcgi_pass   php:9000;
        fastcgi_index  index.php;
        fastcgi_param  SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include        fastcgi_params;
        fastcgi_read_timeout 30;
        fastcgi_buffer_size 16k;
        fastcgi_buffers 4 16k;
    }

    # Headers sécurité
    add_header X-Frame-Options           "DENY"                          always;
    add_header X-Content-Type-Options    "nosniff"                       always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "camera=(), microphone=()"      always;

    # Bloquer accès fichiers cachés
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}

server {
    listen 80;
    server_name portail.koonect.fr;
    root /var/www/koonect/public;
    index index.php;
    charset utf-8;

    client_max_body_size 2M;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass   php:9000;
        fastcgi_index  index.php;
        fastcgi_param  SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include        fastcgi_params;
    }

    add_header X-Robots-Tag "noindex, nofollow" always;
    location ~ /\. { deny all; }
}

